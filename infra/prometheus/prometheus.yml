global:
  scrape_interval: 5s

scrape_configs:

  - job_name: api-gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['careerflow-api-gateway-service:8080']

  - job_name: profile-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['careerflow-profile-service:8081']

  - job_name: job-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['careerflow-job-service:8082']

  - job_name: workflow-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['careerflow-workflow-service:8086']

  - job_name: ai-generation-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['careerflow-ai-generation-service:8084']

  - job_name: document-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['careerflow-document-service:8085']