server:
  port: 8082

spring:
  application:
    name: job-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/careerflow_job}
    username: ${SPRING_DATASOURCE_USERNAME:careerflow}
    password: ${SPRING_DATASOURCE_PASSWORD:careerflow}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

careerflow:
  internal-api-key: ${CAREERFLOW_INTERNAL_API_KEY:local-internal-key}
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
