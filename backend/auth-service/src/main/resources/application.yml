server:
  port: 8079

spring:
  application:
    name: auth-service

careerflow:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    issuer: careerflow-ai
    expiration-minutes: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}
