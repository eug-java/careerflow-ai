server:
  port: 8081

spring:
  application:
    name: profile-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/careerflow_profile}
    username: ${SPRING_DATASOURCE_USERNAME:careerflow}
    password: ${SPRING_DATASOURCE_PASSWORD:careerflow}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

careerflow:
  internal-api-key: ${CAREERFLOW_INTERNAL_API_KEY:local-internal-key}
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: always

info:
  app:
    name: profile-service
    description: Candidate profile management service for CareerFlow AI
    version: 0.1.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
