server:
  port: 8080

spring:
  application:
    name: api-gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8079}
          predicates:
            - Path=/api/v1/auth/**

        - id: profile-service
          uri: ${PROFILE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/profiles/**

        - id: job-service
          uri: ${JOB_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/jobs/**

        - id: matching-service
          uri: ${MATCHING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/matches/**

        - id: ai-generation-service
          uri: ${AI_GENERATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/generations/**

        - id: document-service
          uri: ${DOCUMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/documents/**

        - id: workflow-service
          uri: ${WORKFLOW_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/workflows/**

        - id: workflow-websocket
          uri: ${WORKFLOW_WS_URL:ws://localhost:8086}
          predicates:
            - Path=/ws/workflows/status/**

careerflow:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}
