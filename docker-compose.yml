services:
  postgres:
    image: postgres:16
    container_name: careerflow-postgres
    environment:
      POSTGRES_DB: careerflow_profile
      POSTGRES_USER: careerflow
      POSTGRES_PASSWORD: careerflow
    ports:
      - "5432:5432"

  job-postgres:
    image: postgres:16
    container_name: careerflow-job-postgres
    environment:
      POSTGRES_DB: careerflow_job
      POSTGRES_USER: careerflow
      POSTGRES_PASSWORD: careerflow
    ports:
      - "5433:5432"

  matching-postgres:
    image: postgres:16
    container_name: careerflow-matching-postgres
    environment:
      POSTGRES_DB: careerflow_matching
      POSTGRES_USER: careerflow
      POSTGRES_PASSWORD: careerflow
    ports:
      - "5434:5432"

  document-postgres:
    image: postgres:16
    container_name: careerflow-document-postgres
    environment:
      POSTGRES_DB: careerflow_document
      POSTGRES_USER: careerflow
      POSTGRES_PASSWORD: careerflow
    ports:
      - "5435:5432"
    volumes:
      - careerflow-document-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: careerflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: careerflow
      MINIO_ROOT_PASSWORD: careerflow123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - careerflow-minio-data:/data

  kafka:
    image: apache/kafka:4.1.2
    container_name: careerflow-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  zeebe:
    image: camunda/zeebe:8.6.8
    container_name: careerflow-zeebe
    ports:
      - "26500:26500"
      - "9600:9600"
    environment:
      ZEEBE_BROKER_GATEWAY_SECURITY_AUTHENTICATION_MODE: none
      ZEEBE_BROKER_GATEWAY_ENABLE: "true"
      ZEEBE_BROKER_NETWORK_HOST: 0.0.0.0
      ZEEBE_BROKER_GATEWAY_NETWORK_HOST: 0.0.0.0

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: careerflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:13.1.0-25893932881
    container_name: careerflow-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: careerflow-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  careerflow-postgres-data:
  careerflow-document-postgres-data:
  careerflow-minio-data:
